<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Converter</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main class="container">
        <div class="card">
            <h1>Image Converter</h1>
            <p>Convert JPG, PNG, or JFIF directly in the browser.</p>

            <label class="file-input" for="image-upload">
                <span>Select image file</span>
                <input id="image-upload" type="file" accept="image/jpeg,image/png,image/jfif" />
            </label>

            <div class="controls">
                <div class="format-label">
                    <span>Convert to</span>
                </div>
                <div class="format-options" role="group" aria-label="Conversion format options">
                    <button type="button" class="format-option active" data-format="png">PNG</button>
                    <button type="button" class="format-option" data-format="jpg">JPG</button>
                    <button type="button" class="format-option" data-format="jfif">JFIF</button>
                </div>



                <div class="split-buttons">
                    <button id="convert-button" disabled>Convert</button>
                    <button id="download-button" disabled>Download</button>
                </div>
            </div>

            <div id="preview" class="preview hidden">
                <h2>Preview</h2>
                <img id="preview-image" alt="Selected image preview" />
                <p id="source-info"></p>
            </div>

            <div id="message" class="message"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
